<div class="row g-3" id="project-list-inner">
{% for p in projects %}
    <div class="col-md-6 col-lg-4">
        <div class="triade-card triade-card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div class="d-flex align-items-center gap-2">
                    <span style="width:10px;height:10px;border-radius:50%;background:{{ p.color }};display:inline-block"></span>
                    <strong>{{ p.name }}</strong>
                </div>
                <div class="dropdown">
                    <button class="btn-icon" data-bs-toggle="dropdown"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#edit-proj-{{ p.id }}">Editar</a></li>
                        <li><a class="dropdown-item text-danger" href="#" hx-delete="/projects/{{ p.id }}" hx-target="#project-list" hx-swap="innerHTML" data-confirm="Excluir este projeto?">Excluir</a></li>
                    </ul>
                </div>
            </div>
            {% if p.description %}<p class="text-muted small">{{ p.description }}</p>{% endif %}
            <div class="progress-track mb-1"><div class="progress-fill" style="width: {{ p.percent_complete }}%"></div></div>
            <div class="d-flex justify-content-between small text-muted">
                <span>{{ p.percent_complete }}%</span>
                {% if p.deadline %}<span><i class="fa-regular fa-calendar"></i> {{ p.deadline.strftime('%d/%m/%Y') }}</span>{% endif %}
            </div>
        </div>
    </div>

    <div class="modal fade" id="edit-proj-{{ p.id }}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form hx-post="/projects/{{ p.id }}" hx-target="#project-list" hx-swap="innerHTML">
                    <div class="modal-header"><h5 class="modal-title">Editar projeto</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <div class="mb-3"><label class="form-label">Nome</label><input type="text" name="name" class="form-control" value="{{ p.name }}" required></div>
                        <div class="mb-3"><label class="form-label">Descrição</label><textarea name="description" class="form-control">{{ p.description or '' }}</textarea></div>
                        <div class="row g-2 mb-2">
                            <div class="col-4"><label class="form-label">Cor</label><input type="color" name="color" class="form-control form-control-color" value="{{ p.color }}"></div>
                            <div class="col-4"><label class="form-label">Prazo</label><input type="date" name="deadline" class="form-control" value="{{ p.deadline.isoformat() if p.deadline else '' }}"></div>
                            <div class="col-4"><label class="form-label">% concluído</label><input type="number" name="percent_complete" class="form-control" min="0" max="100" value="{{ p.percent_complete }}"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% else %}
    <p class="text-muted">Nenhum projeto cadastrado ainda.</p>
{% endfor %}
</div>
