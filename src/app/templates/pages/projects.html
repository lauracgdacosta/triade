{% extends "base.html" %}
{% block title %}Projetos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Projetos</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#new-project-modal">
        <i class="fa-solid fa-plus me-1"></i> Novo projeto
    </button>
</div>

<div id="project-list">
    {% include "fragments/project_list.html" %}
</div>

<div class="modal fade" id="new-project-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form hx-post="/projects" hx-target="#project-list" hx-swap="innerHTML">
                <div class="modal-header"><h5 class="modal-title">Novo projeto</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="mb-3"><label class="form-label">Nome</label><input type="text" name="name" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Descrição</label><textarea name="description" class="form-control"></textarea></div>
                    <div class="row g-2">
                        <div class="col-6"><label class="form-label">Cor</label><input type="color" name="color" class="form-control form-control-color" value="#22c55e"></div>
                        <div class="col-6"><label class="form-label">Prazo</label><input type="date" name="deadline" class="form-control"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Criar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
