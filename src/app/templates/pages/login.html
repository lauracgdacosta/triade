{% extends "base.html" %}
{% block title %}Entrar{% endblock %}
{% block auth_content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Bem-vindo de volta</h1>
        <p class="subtitle">Entre para continuar organizando seu tempo.</p>

        {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
        </form>

        <div class="d-flex gap-2 mb-3">
            <a href="/auth/oauth/google" class="btn btn-outline-secondary w-100">
                <i class="fa-brands fa-google"></i> Google
            </a>
            <a href="/auth/oauth/github" class="btn btn-outline-secondary w-100">
                <i class="fa-brands fa-github"></i> GitHub
            </a>
        </div>

        <div class="d-flex justify-content-between small">
            <a href="/forgot-password">Esqueci minha senha</a>
            <a href="/signup">Criar conta</a>
        </div>
    </div>
</div>
{% endblock %}
