{% extends "base.html" %}
{% block title %}Pomodoro{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width: 480px">
    <h2 class="text-center mb-4">Cronômetro Pomodoro</h2>

    <div class="triade-card triade-card-body text-center mb-4">
        <div class="pomodoro-ring" id="pomodoro-ring" style="--progress: 0">
            <div class="pomodoro-ring-inner">
                <span class="text-muted small" id="pomodoro-phase">Pronto</span>
                <span class="pomodoro-time" id="pomodoro-time">25:00</span>
                <span class="text-muted small" id="pomodoro-cycle">Ciclo 0/1</span>
            </div>
        </div>
    </div>

    <div class="triade-card triade-card-body mb-4" id="pomodoro-config">
        <div class="mb-3">
            <label class="form-label">Modo</label>
            <select id="pomodoro-mode" class="form-select">
                <option value="25_5">Clássico — 25 min foco / 5 min pausa</option>
                <option value="50_10">Longo — 50 min foco / 10 min pausa</option>
                <option value="custom">Personalizado</option>
            </select>
        </div>
        <div class="row g-2 mb-3" id="pomodoro-custom-fields" style="display:none">
            <div class="col-6"><label class="form-label">Foco (min)</label><input type="number" id="pomodoro-work" class="form-control" value="25" min="1" max="180"></div>
            <div class="col-6"><label class="form-label">Pausa (min)</label><input type="number" id="pomodoro-break" class="form-control" value="5" min="1" max="60"></div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="form-label">Ciclos</label>
                <input type="number" id="pomodoro-cycles" class="form-control" value="4" min="1" max="20">
            </div>
            <div class="col-6">
                <label class="form-label">Tarefa (opcional)</label>
                <select id="pomodoro-task" class="form-select">
                    <option value="">—</option>
                    {% for t in pending_tasks %}<option value="{{ t.id }}">{{ t.title }}</option>{% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 justify-content-center">
        <button class="btn btn-primary btn-lg" id="btn-start-pomodoro"><i class="fa-solid fa-play me-1"></i> Iniciar</button>
        <button class="btn btn-outline-danger btn-lg d-none" id="btn-cancel-pomodoro"><i class="fa-solid fa-stop me-1"></i> Cancelar</button>
    </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script src="/static/js/pomodoro.js"></script>
{% endblock %}
